version: "3.9"

services:
  gateway:
    build: .
    ports:
      - "8181:8181"
    env_file: .env
    volumes:
      - ./workspace:/app/workspace
      - ./agents:/app/agents
      - ./memory:/app/memory
    restart: always
    command: python gateway/app.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - gateway
    restart: always
    command: streamlit run dashboard/army81_dashboard.py --server.port 8501 --server.address 0.0.0.0 --browser.gatherUsageStats false
    volumes:
      - ./workspace:/app/workspace
      - ./agents:/app/agents

  updater:
    build: .
    env_file: .env
    depends_on:
      - gateway
    restart: always
    command: python scripts/daily_updater.py --schedule
    volumes:
      - ./workspace:/app/workspace

  telegram_bot:
    build: .
    env_file: .env
    depends_on:
      - gateway
    restart: always
    command: python integrations/telegram_bot.py
    environment:
      - GATEWAY_URL=http://gateway:8181
    volumes:
      - ./workspace:/app/workspace
      - ./agents:/app/agents
