version: "3.9"

services:
  # ═══════════════════════════════════════
  # 1. Gateway — البوابة الرئيسية (24/7)
  # ═══════════════════════════════════════
  gateway:
    build: .
    ports:
      - "8181:8181"
    env_file: .env
    volumes:
      - ./workspace:/app/workspace
      - ./agents:/app/agents
      - ./memory:/app/memory
      - ./core:/app/core
      - ./tools:/app/tools
    restart: always
    command: python gateway/app.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════
  # 2. Dashboard — لوحة التحكم البصرية
  # ═══════════════════════════════════════
  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    command: streamlit run dashboard/army81_dashboard.py --server.port 8501 --server.address 0.0.0.0 --browser.gatherUsageStats false
    volumes:
      - ./workspace:/app/workspace
      - ./agents:/app/agents

  # ═══════════════════════════════════════
  # 3. Telegram Bot — التواصل المباشر
  # ═══════════════════════════════════════
  telegram_bot:
    build: .
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    command: python integrations/telegram_bot.py
    environment:
      - GATEWAY_URL=http://gateway:8181
    volumes:
      - ./workspace:/app/workspace
      - ./agents:/app/agents

  # ═══════════════════════════════════════
  # 4. Updater — التحديث اليومي + الجدولة
  # ═══════════════════════════════════════
  updater:
    build: .
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    command: python scripts/daily_updater.py --schedule
    volumes:
      - ./workspace:/app/workspace

  # ═══════════════════════════════════════
  # 5. Trainer — التدريب المستمر 24/7
  # ═══════════════════════════════════════
  trainer:
    build: .
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    command: python scripts/training_cycle_24h.py
    environment:
      - GATEWAY_URL=http://gateway:8181
    volumes:
      - ./workspace:/app/workspace
      - ./agents:/app/agents
      - ./memory:/app/memory

  # ═══════════════════════════════════════
  # 6. Evolver — التطور الذاتي المستمر
  # ═══════════════════════════════════════
  evolver:
    build: .
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    command: python scripts/evolution_runner.py
    environment:
      - GATEWAY_URL=http://gateway:8181
    volumes:
      - ./workspace:/app/workspace
      - ./agents:/app/agents
      - ./core:/app/core
      - ./memory:/app/memory

  # ═══════════════════════════════════════
  # 7. Knowledge Hunter — صيد المعرفة 24/7
  # ═══════════════════════════════════════
  knowledge_hunter:
    build: .
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    command: python scripts/auto_knowledge_updater.py
    environment:
      - GATEWAY_URL=http://gateway:8181
    volumes:
      - ./workspace:/app/workspace

  # ═══════════════════════════════════════
  # 8. Compound Evolution — النواة الحقيقية
  # ═══════════════════════════════════════
  compound_evolution:
    build: .
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    command: python scripts/compound_evolution.py
    environment:
      - GATEWAY_URL=http://gateway:8181
    volumes:
      - ./workspace:/app/workspace
      - ./agents:/app/agents

  # ═══════════════════════════════════════
  # 9. Singular System — النظام المتفرد
  # ═══════════════════════════════════════
  singular_core:
    build: .
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    command: python scripts/singular_system.py
    environment:
      - GATEWAY_URL=http://gateway:8181
    volumes:
      - ./workspace:/app/workspace
      - ./agents:/app/agents
      - ./core:/app/core

  # ═══════════════════════════════════════
  # 10. Real System Engine — المحرك الحقيقي
  #     يجمع كل المكونات في حلقة دقيقة 100%
  # ═══════════════════════════════════════
  real_engine:
    build: .
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    command: python scripts/real_system_engine.py
    environment:
      - GATEWAY_URL=http://gateway:8181
    volumes:
      - ./workspace:/app/workspace
      - ./agents:/app/agents
      - ./core:/app/core
      - ./tools:/app/tools
      - ./memory:/app/memory
      - ./scripts:/app/scripts
