version: "3.9"

services:
  army81:
    build: .
    ports:
      - "8181:8181"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./agents:/app/agents
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # قاعدة بيانات محلية للتطوير
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
