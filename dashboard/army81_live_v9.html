<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Army81 — Live Neural Dashboard v14</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000208;overflow:hidden;font-family:'Cairo',sans-serif;color:#e0e0e0;direction:rtl;}
#canvas3d{position:fixed;top:0;left:0;z-index:1;}

/* TOP BAR */
#topBar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:6px 16px;background:rgba(0,2,8,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,255,255,0.15);}
#topBar .logo{font-family:'Orbitron';font-weight:900;font-size:18px;color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,0.6);}
#topBar .logo span{color:#00FFFF;font-size:11px;margin-right:8px;}
.top-stats{display:flex;gap:12px;font-size:11px;font-family:'Orbitron';}
.top-stats .stat{display:flex;align-items:center;gap:4px;}
.top-stats .stat .label{color:#888;}
.top-stats .stat .val{color:#00FFFF;font-weight:700;}
.toolbar{display:flex;gap:6px;}
.toolbar button{background:rgba(0,255,255,0.08);border:1px solid rgba(0,255,255,0.2);color:#e0e0e0;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'Cairo';transition:all 0.3s;}
.toolbar button:hover{background:rgba(0,255,255,0.2);border-color:#00FFFF;box-shadow:0 0 12px rgba(0,255,255,0.3);}

/* EVENT LOG */
#eventLog{position:fixed;top:45px;left:10px;z-index:90;width:280px;max-height:55vh;background:rgba(0,2,12,0.88);backdrop-filter:blur(14px);border:1px solid rgba(0,255,255,0.12);border-radius:12px;padding:10px;overflow-y:auto;font-size:11px;scrollbar-width:thin;display:none;}
#eventLog h3{font-family:'Orbitron';font-size:12px;color:#00FFFF;margin-bottom:8px;text-align:center;}
.event-item{display:flex;gap:6px;padding:5px 6px;margin-bottom:4px;border-radius:6px;border-left:3px solid;animation:evSlide 0.4s ease-out;}
.event-item.task{border-color:#00FFFF;background:rgba(0,255,255,0.04);}
.event-item.success{border-color:#39FF14;background:rgba(57,255,20,0.04);}
.event-item.error{border-color:#FF3366;background:rgba(255,51,102,0.04);}
.event-item.data{border-color:#FFD700;background:rgba(255,215,0,0.04);}
.event-item.memory{border-color:#BF00FF;background:rgba(191,0,255,0.04);}
.event-item.command{border-color:#FFD700;background:rgba(255,215,0,0.06);}
.event-item.cluster{border-color:#FF6EC7;background:rgba(255,110,199,0.04);}
.ev-icon{font-size:14px;min-width:20px;text-align:center;}
.ev-body{flex:1;min-width:0;}
.ev-title{font-weight:700;font-size:10px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-desc{font-size:10px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-time{font-family:'Orbitron';font-size:8px;color:#555;min-width:50px;text-align:left;}
@keyframes evSlide{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}

/* STATS PANEL */
#statsPanel{position:fixed;top:45px;right:10px;z-index:90;background:rgba(0,2,12,0.88);backdrop-filter:blur(14px);border:1px solid rgba(0,255,255,0.12);border-radius:12px;padding:10px 14px;font-size:11px;min-width:200px;}
#statsPanel h3{font-family:'Orbitron';font-size:11px;color:#FFD700;margin-bottom:8px;text-align:center;}
.s-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.s-label{color:#888;font-size:10px;}
.s-val{font-family:'Orbitron';font-size:10px;color:#00FFFF;font-weight:700;}
.s-val.green{color:#39FF14;}.s-val.gold{color:#FFD700;}.s-val.red{color:#FF3366;}
#heartbeatBar{width:100%;height:2px;background:rgba(255,255,255,0.05);border-radius:1px;margin-top:6px;overflow:hidden;}
#heartbeatPulse{height:100%;width:0;background:#39FF14;border-radius:1px;transition:width 0.3s;}

/* VIEW MODES */
#viewModes{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);z-index:90;display:flex;gap:6px;background:rgba(0,2,12,0.85);backdrop-filter:blur(12px);border:1px solid rgba(0,255,255,0.12);border-radius:20px;padding:5px 10px;}
#viewModes button{background:none;border:1px solid rgba(255,255,255,0.1);color:#888;padding:4px 12px;border-radius:14px;cursor:pointer;font-size:10px;font-family:'Cairo';transition:all 0.3s;}
#viewModes button.active{background:rgba(0,255,255,0.15);border-color:#00FFFF;color:#00FFFF;}

/* CHAT */
#chatBox{display:none;position:fixed;bottom:60px;right:10px;z-index:95;width:340px;max-height:50vh;background:rgba(0,2,12,0.92);backdrop-filter:blur(16px);border:1px solid rgba(255,215,0,0.2);border-radius:14px;overflow:hidden;}
#chatBox h3{font-family:'Orbitron';font-size:12px;color:#FFD700;padding:10px 14px;border-bottom:1px solid rgba(255,215,0,0.1);text-align:center;}
#chatMessages{padding:10px;max-height:250px;overflow-y:auto;font-size:11px;scrollbar-width:thin;}
.chat-msg{padding:6px 10px;margin-bottom:6px;border-radius:8px;}
.chat-msg.user{background:rgba(0,255,255,0.08);border:1px solid rgba(0,255,255,0.15);text-align:right;}
.chat-msg.system{background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.1);font-size:10px;color:#aaa;}
#chatInput{width:100%;padding:8px 12px;background:rgba(0,0,0,0.4);border:none;border-top:1px solid rgba(255,215,0,0.1);color:#e0e0e0;font-family:'Cairo';font-size:12px;outline:none;}
#chatTarget{width:100%;padding:4px 8px;background:rgba(0,0,0,0.3);border:none;border-top:1px solid rgba(255,215,0,0.05);color:#aaa;font-size:10px;font-family:'Cairo';outline:none;}

/* AGENT CARD */
#agentCard{position:fixed;z-index:200;pointer-events:none;opacity:0;transform:translateY(10px);transition:opacity 0.25s,transform 0.25s;background:rgba(0,2,15,0.94);backdrop-filter:blur(20px);border:1px solid rgba(0,255,255,0.2);border-radius:14px;padding:14px;width:320px;box-shadow:0 0 30px rgba(0,255,255,0.1);}
#agentCard.show{opacity:1;transform:translateY(0);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(0,255,255,0.1);}
.card-id{font-family:'Orbitron';font-size:14px;font-weight:900;}
.card-name{font-size:12px;color:#aaa;}
.card-state{font-size:10px;padding:2px 8px;border-radius:10px;font-family:'Orbitron';}
.card-state.busy{background:rgba(255,165,0,0.2);color:#FFA500;}
.card-state.active{background:rgba(57,255,20,0.2);color:#39FF14;}
.card-state.idle{background:rgba(100,100,100,0.2);color:#888;}
.card-state.error{background:rgba(255,51,102,0.2);color:#FF3366;}
.card-section{margin-bottom:8px;}
.card-section-title{font-size:9px;color:#666;font-family:'Orbitron';margin-bottom:4px;text-transform:uppercase;}
.card-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:6px;}
.card-bar-fill{height:100%;border-radius:2px;transition:width 0.5s;}
.card-bar-fill.progress{background:linear-gradient(90deg,#00FFFF,#39FF14);}
.card-bar-fill.knowledge{background:linear-gradient(90deg,#FF6EC7,#BF00FF);}
.tool-tag{display:inline-block;padding:1px 6px;margin:1px;border-radius:4px;font-size:8px;background:rgba(0,255,255,0.08);border:1px solid rgba(0,255,255,0.15);color:#aaa;}
.tool-tag.active-tool{background:rgba(57,255,20,0.15);border-color:#39FF14;color:#39FF14;}

/* LOADING */
#loadScreen{position:fixed;inset:0;z-index:9999;background:#000208;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s;}
#loadScreen.done{opacity:0;pointer-events:none;}
#loadScreen h1{font-family:'Orbitron';font-size:36px;color:#FFD700;text-shadow:0 0 40px rgba(255,215,0,0.5);margin-bottom:6px;}
#loadScreen p{font-family:'Orbitron';font-size:12px;color:#555;letter-spacing:4px;}
#loadBar{width:300px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:20px;overflow:hidden;}
#ldFill{height:100%;width:0;background:linear-gradient(90deg,#FFD700,#00FFFF);border-radius:2px;transition:width 0.4s;}
#ldStatus{margin-top:10px;font-size:11px;color:#666;font-family:'Cairo';}
.glow-line{width:200px;height:1px;background:linear-gradient(90deg,transparent,#FFD700,transparent);margin:10px 0;}
#fpsCounter{position:fixed;bottom:6px;left:4px;z-index:90;font-family:'Orbitron';font-size:9px;color:#39FF14;opacity:0.6;}
</style>
</head>

<canvas id="canvas3d"></canvas>

<!-- TOP BAR -->
<div id="topBar">
  <div class="logo">ARMY81 <span>LIVE v14</span></div>
  <div class="top-stats">

    <div class="stat"><span class="label">نبضات</span><span class="val" id="pulseCount">0</span></div>
    <div class="stat"><span class="label">ذاكرة</span><span class="val" id="sMemory">0 MB</span></div>
    <div class="stat"><span class="label">نشط</span><span class="val" id="activeCount">0</span></div>

  </div>
  <div class="toolbar">

    <button onclick="stopSwarmSession()" style="border-color:rgba(255,165,0,0.3);">⏹️ إيقاف</button>
    <button onclick="killSwitch()" id="killSwitch" style="border-color:rgba(255,51,102,0.3);">KILL</button>
  </div>
</div>

<!-- EVENT LOG -->
<div id="eventLog"><h3>سجل الأحداث الحية</h3><div id="eventItems"></div></div>

<!-- STATS PANEL -->
<div id="statsPanel">
  <h3>إحصائيات النظام</h3>
  <div id="heartbeatBar"><div id="heartbeatPulse"></div></div>
</div>

<!-- VIEW MODES -->
<div id="viewModes">
  <button class="active" onclick="setView('neural')">الشبكة العصبية</button>
  <button onclick="setView('tools')">الأدوات</button>
  <button onclick="setView('knowledge')">المعرفة</button>
</div>

<!-- CHAT -->
<div id="chatBox">
  <h3>مركز القيادة</h3>
  <select id="chatTarget"><option value="all">بث عام — جميع الوكلاء</option></select>
  <div id="chatMessages"></div>
  <input id="chatInput" placeholder="أدخل الأمر..." onkeydown="if(event.key==='Enter')sendCmd()">
</div>

<!-- AGENT CARD -->
<div id="agentCard">
  <div class="card-header"><div><span class="card-id" id="cardId">A01</span><div class="card-name" id="cardName">وكيل</div></div><span class="card-state idle" id="cardState">خامل</span></div>
  <div class="card-section"><div class="card-section-title">النشاط الحالي</div><div id="cardActivity" style="font-size:11px;color:#ccc;">لا يوجد</div></div>
  <div class="card-section"><div class="card-section-title">التقدم</div><div class="card-bar"><div class="card-bar-fill progress" id="cardProgress" style="width:0"></div></div></div>
  <div class="card-section"><div class="card-section-title">المعرفة</div><div class="card-bar"><div class="card-bar-fill knowledge" id="cardKnowledge" style="width:0"></div></div></div>
  <div class="card-section"><div class="card-section-title">الذاكرة</div><div id="cardMemCount" style="font-size:10px;color:#BF00FF;">0 عنصر</div></div>
  <div class="card-section"><div class="card-section-title">الأدوات</div><div id="cardTools" style="line-height:1.8;"></div></div>
  <div class="card-section"><div class="card-section-title">آخر إجراء</div><div id="cardLastAction" style="font-size:10px;color:#888;">لا يوجد</div></div>
</div>

<!-- LOADING -->
<div id="loadScreen">
  <h1>ARMY81</h1>
  <p>VISUAL STORY ENGINE v8</p>
  <div class="glow-line"></div>
  <div id="loadBar"><div id="ldFill"></div></div>

</div>
<div id="fpsCounter">FPS: 0</div>

function startLivePolling(){
  // Poll swarm events every 1.5 seconds
  setInterval(function(){
    if(!swarmRunning) return;
    fetch(GW+'/swarm/events?since='+swarmSince).then(function(r){return r.json();}).then(function(d){
      swarmSince=d.next_since;
      swarmRunning=d.active;
      d.events.forEach(function(evt){ processSwarmEvent(evt); });
      // Update core load
      var busy=AGENTS.filter(function(a){return a.state==='busy';}).length;
      EventBus.emit(EVT.CORE_LOAD_CHANGE,{load:busy/AGENTS.length});
    }).catch(function(){});
  },1500);

  // Poll gateway status + real memory every 5 seconds
  setInterval(function(){
    fetch(GW+'/status').then(function(r){return r.json();}).then(function(d){
      document.getElementById('gwMode').textContent='LIVE';
      // v14: Real memory stats
      if(d.memory){
        var mem=d.memory;
        var total=mem.episodic+mem.swarm_agents*50+(mem.core_interactions||0)*10;
        var mbEst=Math.max(1,Math.round(total/100));
        document.getElementById('sMemory').textContent=mbEst+' MB';
        // Update stats panel
        var sp=document.getElementById('statsPanel');
        if(sp && !sp.querySelector('.mem-real')){
          var div=document.createElement('div');div.className='mem-real';
          div.innerHTML='<div class="s-row"><span class="s-label">حلقات (Episodic)</span><span class="s-val">'+mem.episodic+'</span></div>'
            +'<div class="s-row"><span class="s-label">وكلاء بذاكرة</span><span class="s-val" style="color:#BF00FF;">'+mem.swarm_agents+'</span></div>'
            +'<div class="s-row"><span class="s-label">تفاعلات النواة</span><span class="s-val" style="color:#FF6EC7;">'+(mem.core_interactions||0)+'</span></div>'
            +'<div class="s-row"><span class="s-label">قرارات جماعية</span><span class="s-val gold">'+(mem.core_decisions||0)+'</span></div>'
            +'<div class="s-row"><span class="s-label">معرفة مشتركة</span><span class="s-val green">'+(mem.core_knowledge||0)+'</span></div>';
          sp.appendChild(div);
        } else if(sp){
          var existing=sp.querySelector('.mem-real');
          if(existing) existing.innerHTML='<div class="s-row"><span class="s-label">حلقات (Episodic)</span><span class="s-val">'+mem.episodic+'</span></div>'
            +'<div class="s-row"><span class="s-label">وكلاء بذاكرة</span><span class="s-val" style="color:#BF00FF;">'+mem.swarm_agents+'</span></div>'
            +'<div class="s-row"><span class="s-label">تفاعلات النواة</span><span class="s-val" style="color:#FF6EC7;">'+(mem.core_interactions||0)+'</span></div>'
            +'<div class="s-row"><span class="s-label">قرارات جماعية</span><span class="s-val gold">'+(mem.core_decisions||0)+'</span></div>'
            +'<div class="s-row"><span class="s-label">معرفة مشتركة</span><span class="s-val green">'+(mem.core_knowledge||0)+'</span></div>';
        }
      }
      // Update agent count
      if(d.router && d.router.total_agents){
        document.getElementById('sConn').textContent=d.router.total_agents;
      }
    }).catch(function(){
      document.getElementById('gwMode').textContent='LOST';
    });
  },5000);

  // Poll swarm memory stats every 10 seconds
  setInterval(function(){
    fetch(GW+'/memory/swarm/stats').then(function(r){return r.json();}).then(function(d){
      if(d.agents_with_memory){
        // Update memory rings for agents that have memories
        var agentStats=d.agent_stats||{};
        Object.keys(agentStats).forEach(function(aid){
          var ag=AGENTS.find(function(a){return a.id===aid;});
          if(ag){
            var stats=agentStats[aid];
            ag.memory=Math.max(ag.memory,(stats.known_agents||0)*10+(stats.interactions||0)*5);
            ag.knowledge=Math.min(100,ag.knowledge+Math.min(5,(stats.interactions||0)));
          }
        });
      }
    }).catch(function(){});
  },10000);

  // Poll network intelligence every 15 seconds
  setInterval(function(){
    fetch(GW+'/network/health').then(function(r){return r.json();}).then(function(d){
      if(d.total_connections){
        document.getElementById('sConn').textContent=d.total_connections;
      }
      // Strengthen visual bonds for strongest connections
      if(d.strongest_bonds){
        d.strongest_bonds.forEach(function(bond){
          var a1=AGENTS.find(function(a){return a.id===bond.agents[0];});
          var a2=AGENTS.find(function(a){return a.id===bond.agents[1];});
          if(a1&&a2){
            var conn=connections.find(function(c){return(c.from===a1&&c.to===a2)||(c.from===a2&&c.to===a1);});
            if(conn){conn.line.material.opacity=Math.min(0.5,bond.weight);conn.brightTime=30;}
          }
        });
      }
    }).catch(function(){});
  },15000);

  // Check for proposals every 15 seconds
  setInterval(function(){
    if(!swarmRunning) return;

      }
    }).catch(function(){});
  },15000);
}

function processSwarmEvent(evt){
  var t=evt.event_type, d=evt.data||{}, from=evt.from_agent, to=evt.to_agent;

  if(t==='swarm_started'){
    logEvent('success','🐝','سرب','بدأت جلسة التواصل — '+d.topic);
    var msgs=document.getElementById('chatMessages');
    if(msgs) msgs.innerHTML+='<div class="chat-msg system" style="background:rgba(57,255,20,0.08);">🐝 <b>6 مراحل:</b> تعارف → صيد معرفة → مناقشة → تقطير → تعاون → اقتراحات</div>';
    return;
  }
  if(t==='swarm_completed'){
    var memStats=d.memory_stats||{};
    var memMsg='انتهت الجلسة — '+d.total_events+' حدث';
    if(memStats.agents_with_memory) memMsg+=' | 🧠 '+memStats.agents_with_memory+' وكيل بنى ذاكرة | '+( memStats.total_interactions||0)+' تفاعل';
    logEvent('success','🏁','سرب',memMsg);
    swarmRunning=false;
    // Show in chat
    var msgs=document.getElementById('chatMessages');
    if(msgs) msgs.innerHTML+='<div class="chat-msg system" style="background:rgba(57,255,20,0.08);border-color:#39FF14;">🏁 <b>انتهت جلسة السرب</b><br>'+memMsg+'</div>';
    return;
  }
  if(t==='agent_message'){
    EventBus.emit(EVT.AGENT_MESSAGE,{fromId:from,toId:to});
    logEvent('data','💬',from+' → '+to, d.message||'تواصل');
  }
  else if(t==='task_completed'){
    EventBus.emit(EVT.TASK_COMPLETED,{agentId:from});
    var preview=(d.result||'').substring(0,80);
    var phaseEmoji={'introduction':'🤝','knowledge_hunt':'🔍','discussion':'💬','distillation_teach':'🎓','distillation_learn':'📚','collaboration':'🔧','proposals':'👑'};
    var emoji=phaseEmoji[d.phase]||'✅';
    logEvent('success',emoji,from, (d.phase||'')+': '+preview);
    // Show result in chat
    var a=AGENTS.find(function(x){return x.id===from;});
    var msgs=document.getElementById('chatMessages');
    if(msgs && d.result){
      msgs.innerHTML+='<div class="chat-msg system">🤖 <b>'+(a?a.name_ar:from)+'</b> ['+( d.phase||'')+']: '+d.result.substring(0,200)+'</div>';
      msgs.scrollTop=msgs.scrollHeight;
    }
  }
  else if(t==='task_failed'){
    EventBus.emit(EVT.TASK_FAILED,{agentId:from,task:d.error||'خطأ'});
  }
  else if(t==='cluster_formed'){
    var ids=d.cluster||[];
    EventBus.emit(EVT.CLUSTER_FORMED,{agentIds:ids,task:d.topic||'فريق عمل',clusterId:'sw_'+Date.now()});
    // Mark agents as busy
    ids.forEach(function(id){
      var ag=AGENTS.find(function(x){return x.id===id;});
      if(ag){ag.state='busy';ag.shakeIntensity=0.08;}
    });
  }
  else if(t==='cluster_dissolved'){
    var ids=d.cluster||[];
    ids.forEach(function(id){
      var ag=AGENTS.find(function(x){return x.id===id;});
      if(ag){ag.state='active';ag.shakeIntensity=0;ag.clusterTarget=null;}
    });
  }
  else if(t==='memory_saved'){
    var memType=d.type||'knowledge';
    var memAmount=d.agents_remembered||d.amount||3;
    EventBus.emit(EVT.MEMORY_SAVED,{agentId:from,amount:memAmount,size:memAmount*5,topic:d.topic||memType});
    if(memType==='introduction'){
      logEvent('memory','🤝',from+' ↔ '+(to||''), 'تعارف وبناء ذاكرة');
    } else if(memType==='collaboration'){
      logEvent('memory','🧠',from, 'حفظ تعاون — '+memAmount+' وكلاء');
    }
  }
  else if(t==='proposals_ready'){
    logEvent('command','👑','القائد A01','📋 اقتراحات جاهزة تنتظر موافقتك');
    var msgs=document.getElementById('chatMessages');

  }
  else if(t==='error'){

var chatVis=false;
function toggleChat(){chatVis=!chatVis;document.getElementById('chatBox').style.display=chatVis?'block':'none';}
function toggleLog(){eventLogVisible=!eventLogVisible;document.getElementById('eventLog').style.display=eventLogVisible?'block':'none';}
function toggleHeatmap(){heatmapOn=!heatmapOn;}
function setView(v){currentView=v;document.querySelectorAll('#viewModes button').forEach(function(b){b.classList.remove('active');});document.querySelectorAll('#viewModes button').forEach(function(b){if(b.textContent.indexOf(v==='neural'?'العصبية':v==='tools'?'الأدوات':'المعرفة')>=0)b.classList.add('active');});}
function sendCmd(){var input=document.getElementById('chatInput');var msg=input.value.trim();if(!msg)return;var target=document.getElementById('chatTarget').value;var msgs=document.getElementById('chatMessages');msgs.innerHTML+='<div class="chat-msg user">'+msg+'</div>';input.value='';
  if(!gwConnected){msgs.innerHTML+='<div class="chat-msg system">❌ Gateway غير متصل</div>';msgs.scrollTop=msgs.scrollHeight;return;}
  var agentId=target==='all'?null:target;
  var agentObj=agentId?AGENTS.find(function(x){return x.id===agentId;}):null;
  if(agentId){
    EventBus.emit(EVT.COMMAND_SENT,{agentId:agentId,command:msg});
    EventBus.emit(EVT.TASK_ASSIGNED,{agentId:agentId,task:msg});
    createCommandPath(agentObj||AGENTS[0],false);
    msgs.innerHTML+='<div class="chat-msg system">⚡ أمر إلى '+(agentObj?agentObj.name_ar:agentId)+' — جاري التنفيذ...</div>';
  } else {
    createCommandPath(AGENTS[0],true);
    msgs.innerHTML+='<div class="chat-msg system">📡 بث لجميع الوكلاء...</div>';
  }
  // Real API call
  fetch(GW+'/task',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({task:msg,agent_id:agentId})
  }).then(function(r){return r.json();}).then(function(d){
    var respAgent=d.agent_id||'SYS';
    EventBus.emit(EVT.TASK_COMPLETED,{agentId:respAgent});
    var resultText=(d.result||'لا يوجد رد').substring(0,800);
    msgs.innerHTML+='<div class="chat-msg system">🤖 <b>'+(d.agent_name||respAgent)+'</b> ('+Math.round(d.elapsed_seconds||0)+'s | '+( d.model_used||'')+')<br>'+resultText+'</div>';
    msgs.scrollTop=msgs.scrollHeight;
  }).catch(function(e){
    msgs.innerHTML+='<div class="chat-msg system" style="border-color:#FF3366;">❌ خطأ: '+e+'</div>';
    msgs.scrollTop=msgs.scrollHeight;
  });
  msgs.scrollTop=msgs.scrollHeight;}

var raycaster=new THREE.Raycaster();var mouse=new THREE.Vector2();
canvas.addEventListener('mousemove',function(e){

  else card.classList.remove('show');
});

/* ═══ ANIMATION LOOP ═══ */
var lastTime=0,frameCount=0,fps=0;
function animate(time){
  requestAnimationFrame(animate);
  var delta=(time-lastTime)/1000;lastTime=time;
  frameCount++;if(frameCount%30===0){fps=Math.round(1/Math.max(delta,0.001));document.getElementById('sFps').textContent=fps;document.getElementById('fpsCounter').textContent='FPS: '+fps;}
  controls.update();nebGroup.rotation.y+=0.0001;

  // Core reactor
  coreInner.rotation.y+=coreTargetSpeed*2;
  coreInner.scale.setScalar(THREE.MathUtils.lerp(coreInner.scale.x,1+coreLoad*0.3,0.05));
  coreRings.forEach(function(r,i){r.rotation.x+=coreTargetSpeed*(i+1);r.rotation.z+=coreTargetSpeed*0.7*(i+1);});
  var cH=0.12-coreLoad*0.12;coreMat.color.setHSL(cH,1,0.5);coreMat.emissive.setHSL(cH,1,0.5);coreLight.intensity=2+coreLoad*4;

  // Heartbeat
  heartbeatTimer++;
  if(heartbeatTimer>=heartbeatInterval){heartbeatTimer=0;createHeartbeat();var hb=document.getElementById('heartbeatPulse');hb.style.width='100%';hb.style.background=heartbeatColor.getStyle();setTimeout(function(){hb.style.width='0';},300);}

  // Agents
  AGENTS.forEach(function(a){
    if(!a.mesh)return;
    a.prevPos={x:a.mesh.position.x,y:a.mesh.position.y,z:a.mesh.position.z};
    if(a.shakeIntensity>0){a.mesh.position.x=a.pos.x+(Math.random()-0.5)*a.shakeIntensity;a.mesh.position.y=a.pos.y+(Math.random()-0.5)*a.shakeIntensity;a.mesh.position.z=a.pos.z+(Math.random()-0.5)*a.shakeIntensity;a.mesh.rotation.x+=(Math.random()-0.5)*0.05;}
    else if(a.clusterTarget){a.mesh.position.x=THREE.MathUtils.lerp(a.mesh.position.x,a.clusterTarget.x,0.02);a.mesh.position.y=THREE.MathUtils.lerp(a.mesh.position.y,a.clusterTarget.y,0.02);a.mesh.position.z=THREE.MathUtils.lerp(a.mesh.position.z,a.clusterTarget.z,0.02);}
    else{a.mesh.position.x=THREE.MathUtils.lerp(a.mesh.position.x,a.basePos.x,0.03);a.mesh.position.y=THREE.MathUtils.lerp(a.mesh.position.y,a.basePos.y,0.03);a.mesh.position.z=THREE.MathUtils.lerp(a.mesh.position.z,a.basePos.z,0.03);}
    a.mesh.rotation.y+=a.state==='busy'?0.02:0.002;
    if(a.state==='busy'&&a.progress<30){a.deepThinkTime++;if(a.deepThinkTime>150)createDeepThink(a);}else{a.deepThinkTime=0;}
    if(a.glitchTime>0){a.glitchTime--;a.mesh.material.emissiveIntensity=Math.random()>0.5?1.5:0.05;a.mesh.material.color.setHex(Math.random()>0.5?0xFF3366:0x0033FF);if(a.glitchTime<=0){a.mesh.material.color.setHex(CATS[a.cat].color);a.mesh.material.emissiveIntensity=0.4;a.statusRing.material.color.setHex(0x666666);}}
    a.currentGrowth=THREE.MathUtils.lerp(a.currentGrowth,a.growthTarget,0.01);
    var vScale=currentView==='knowledge'?(0.5+(a.knowledge/100)*1.5):1;
    a.mesh.scale.setScalar(a.currentGrowth*vScale);
    if(a.statusRing){a.statusRing.position.copy(a.mesh.position);a.statusRing.rotation.z+=0.005;}
    if(a.auraMesh){a.auraMesh.position.copy(a.mesh.position);a.auraMesh.material.opacity=THREE.MathUtils.lerp(a.auraMesh.material.opacity,a.state==='busy'?0.25:a.state==='active'?0.1:0,0.05);a.auraMesh.scale.setScalar(a.currentGrowth*1.3);}
    a.memRings.forEach(function(r,i){r.position.copy(a.mesh.position);r.rotation.z+=0.003*(i+1);r.rotation.x+=0.001*(i+1);});
    var dx=a.mesh.position.x-a.prevPos.x,dy=a.mesh.position.y-a.prevPos.y,dz=a.mesh.position.z-a.prevPos.z;
    if(Math.sqrt(dx*dx+dy*dy+dz*dz)>0.3){var tr=new THREE.Mesh(new THREE.SphereGeometry(0.15,4,4),new THREE.MeshBasicMaterial({color:CATS[a.cat].color,transparent:true,opacity:0.3,blending:THREE.AdditiveBlending}));tr.position.set(a.prevPos.x,a.prevPos.y,a.prevPos.z);scene.add(tr);motionTrails.push({mesh:tr,type:'trail'});}
    if(a.state==='idle'&&a.shakeIntensity===0&&a.glitchTime===0)a.mesh.material.emissiveIntensity=THREE.MathUtils.lerp(a.mesh.material.emissiveIntensity,0.3,0.02);
  });

  // Connection brightness decay
  connections.forEach(function(c){if(c.brightTime>0){c.brightTime--;c.line.material.opacity=THREE.MathUtils.lerp(c.line.material.opacity,c.baseOp,0.03);}});

  // Pulses
  for(var i=pulses.length-1;i>=0;i--){var p=pulses[i];p.t+=p.speed;if(p.t>=1){scene.remove(p.mesh);if(p.glow)scene.remove(p.glow);pulses.splice(i,1);continue;}var pos=p.curve.getPoint(p.t);p.mesh.position.copy(pos);p.mesh.material.opacity=1-p.t*0.5;if(p.glow){p.glow.position.copy(pos);p.glow.material.opacity=(1-p.t)*0.3;}}
  document.getElementById('pulseCount').textContent=pulses.length;

  // Shockwaves
  for(var i=shockwaves.length-1;i>=0;i--){var sw=shockwaves[i];if(sw.shrink){sw.scale*=0.95;sw.life-=0.02;}else{sw.scale+=0.15;sw.life-=0.02;}sw.mesh.scale.setScalar(sw.scale);sw.mesh.material.opacity=sw.life*0.6;if(sw.life<=0){scene.remove(sw.mesh);shockwaves.splice(i,1);}}

  // Data fetches
  for(var i=dataFetches.length-1;i>=0;i--){var d=dataFetches[i];d.t+=d.speed;if(d.t>=1){scene.remove(d.mesh);dataFetches.splice(i,1);continue;}d.mesh.position.lerpVectors(d.start,d.target,d.t);d.mesh.material.opacity=1-d.t*0.3;}

  // Data streams
  for(var i=dataStreams.length-1;i>=0;i--){var ds=dataStreams[i];ds.life--;var opacity=Math.min(1,ds.life/60)*0.7;ds.particles.forEach(function(p){p.userData.t+=0.005+Math.random()*0.002;if(p.userData.t>1)p.userData.t=0;var pos=ds.curve.getPoint(p.userData.t);p.position.copy(pos);p.material.opacity=opacity;});if(ds.life<=0){ds.particles.forEach(function(p){scene.remove(p);});dataStreams.splice(i,1);}}

  // Deep thinkers
  for(var i=deepThinkers.length-1;i>=0;i--){var a=deepThinkers[i];if(!a.deepThinkObj)continue;var dt=a.deepThinkObj;dt.time+=0.02;dt.group.position.copy(a.mesh.position).add(new THREE.Vector3(0,2,0));
    if(dt.solved){dt.rings.forEach(function(r){r.material.opacity-=0.02;r.scale.multiplyScalar(1.05);});dt.dots.forEach(function(d){d.material.opacity-=0.02;});if(dt.rings[0].material.opacity<=0){dt.rings.forEach(function(r){dt.group.remove(r);});dt.dots.forEach(function(d){dt.group.remove(d);});scene.remove(dt.group);a.deepThinkObj=null;deepThinkers.splice(i,1);}}
    else{var spd=1+dt.time*0.5;dt.rings.forEach(function(r,ri){r.rotation.z+=0.02*spd*(ri+1);r.scale.setScalar(1+Math.sin(dt.time*2)*0.1);var hue=0.6-dt.time*0.01;r.material.color.setHSL(Math.max(0,hue),0.8,0.6);});dt.dots.forEach(function(d,di){var angle=dt.time*spd+di*(Math.PI*2/6);d.position.set(Math.cos(angle)*1.5,Math.sin(dt.time*3)*0.3,Math.sin(angle)*1.5);});}}

  // Task icons
  taskIcons.forEach(function(ti){if(ti.mesh){ti.mesh.position.set(ti.agent.mesh.position.x,ti.agent.mesh.position.y+2,ti.agent.mesh.position.z);ti.mesh.rotation.y+=0.02;ti.mesh.rotation.x+=0.01;}});

  // Heartbeats
  for(var i=heartbeats.length-1;i>=0;i--){var h=heartbeats[i];h.scale+=0.4;h.life-=0.008;h.mesh.scale.setScalar(h.scale);h.mesh.material.opacity=h.life*0.3;h.mesh.lookAt(camera.position);if(h.life<=0){scene.remove(h.mesh);heartbeats.splice(i,1);}}

  // Motion trails + eureka
  for(var i=motionTrails.length-1;i>=0;i--){var mt=motionTrails[i];if(mt.type==='eureka'){mt.mesh.position.add(mt.mesh.userData.vel);mt.mesh.userData.life-=0.02;mt.mesh.material.opacity=mt.mesh.userData.life;if(mt.mesh.userData.life<=0){scene.remove(mt.mesh);motionTrails.splice(i,1);}}else{mt.mesh.material.opacity-=0.015;if(mt.mesh.material.opacity<=0){scene.remove(mt.mesh);motionTrails.splice(i,1);}}}

  // External beams
  for(var i=extBeams.length-1;i>=0;i--){var eb=extBeams[i];eb.life--;eb.beam.material.opacity=Math.min(0.4,eb.life/60)*0.4;eb.particles.forEach(function(p){p.position.y-=p.userData.speed;if(p.position.y<eb.agent.mesh.position.y){p.position.y=eb.agent.mesh.position.y+50;p.material.opacity=0.8;}p.material.opacity*=0.99;});if(eb.life<=0){scene.remove(eb.beam);eb.particles.forEach(function(p){scene.remove(p);});extBeams.splice(i,1);}}

  // Command beams
  for(var i=commandBeams.length-1;i>=0;i--){var b=commandBeams[i];b.life-=0.015;b.mesh.material.opacity=b.life;if(b.life<=0){scene.remove(b.mesh);commandBeams.splice(i,1);}}

  // Storms
  for(var i=storms.length-1;i>=0;i--){var s=storms[i];s.life-=0.005;s.mesh.material.opacity=s.life*0.15;s.mesh.position.y=s.agent.mesh.position.y+3+Math.sin(time*0.005)*0.3;s.lt++;if(s.lt>30&&Math.random()>0.8){s.lt=0;var lGeo=new THREE.BufferGeometry().setFromPoints([s.mesh.position.clone(),s.agent.mesh.position.clone()]);var l=new THREE.Line(lGeo,new THREE.LineBasicMaterial({color:0xFF0000,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending}));scene.add(l);setTimeout(function(){scene.remove(l);},150);}if(s.life<=0){scene.remove(s.mesh);storms.splice(i,1);}}

  // Stats update
  if(frameCount%60===0){var tT=AGENTS.reduce(function(s,a){return s+a.taskCount;},0),tS=AGENTS.reduce(function(s,a){return s+a.successCount;},0),tE=AGENTS.reduce(function(s,a){return s+a.errorCount;},0),tM=AGENTS.reduce(function(s,a){return s+a.memory;},0);document.getElementById('sTasks').textContent=tT;document.getElementById('sSuccess').textContent=tT>0?Math.round(tS/tT*100)+'%':'0%';document.getElementById('sErrors').textContent=tE;document.getElementById('sMemory').textContent=Math.round(tM)+' MB';document.getElementById('activeCount').textContent=AGENTS.filter(function(a){return a.state==='busy';}).length;}

  composer.render();
}
